# Render Blueprint — deploy with "New + → Blueprint" after pushing to GitHub.
#
# PDF generation uses Browserless.io (hosted Chrome) instead of running
# Chrome on this server — Render's free plan doesn't have enough RAM to
# run headless Chrome reliably. Set BROWSERLESS_TOKEN below.
#
# CONFIGURED FOR THE FREE PLAN.
#   ⚠️ Free plan = NO persistent disk: the SQLite database is WIPED whenever
#   the service redeploys, restarts, or wakes from sleep (it sleeps after
#   ~15 min idle; the next request takes ~50 s to wake it).
#   - Master data (districts/stations/employees) is SAFE — it re-imports from
#     the committed CSV files on every boot.
#   - Inspection records are NOT safe — download snapshots regularly from
#     /backup?key=<ADMIN_KEY>  (key is in the service's Environment tab).
#
# UPGRADE LATER (real data safety, ~$7/mo): set `plan: starter` and uncomment
# the disk + DATA_DIR lines below, then push.
services:
  - type: web
    name: msrtc-checklist
    runtime: node
    plan: free
    buildCommand: "npm install"
    startCommand: node server/server.js
    healthCheckPath: /health
    envVars:
      - key: BROWSERLESS_TOKEN
        sync: false          # paste your Browserless.io API token in the dashboard
      - key: ADMIN_KEY
        generateValue: true  # enables GET /backup?key=... (value shown in dashboard)
      - key: SHEET_ID
        sync: false
      - key: GOOGLE_SA_EMAIL
        sync: false
      - key: GOOGLE_SA_PRIVATE_KEY
        sync: false
      # - key: DATA_DIR
      #   value: /data
    # disk:
    #   name: msrtc-data
    #   mountPath: /data
    #   sizeGB: 1
