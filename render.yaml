# Render Blueprint — deploy with "New + → Blueprint" after pushing to GitHub.
#
# CONFIGURED FOR THE FREE PLAN.
#   ⚠️ Free plan = NO persistent disk: the SQLite database is WIPED whenever
#   the service redeploys, restarts, or wakes from sleep (it sleeps after
#   ~15 min idle; the next request takes ~50 s to wake it).
#   - Master data (districts/stations/employees) is SAFE — it re-imports from
#     the committed CSV files on every boot.
#   - Inspection records are NOT safe — download snapshots regularly from
#     /backup?key=<ADMIN_KEY>  (key is in the service's Environment tab).
#
#   ⚠️ PDF generation now uses headless Chromium (Puppeteer) so Devanagari
#   text renders correctly. `npm install` will download a bundled Chromium
#   (~250-300MB) during build — this is normal and only happens at build
#   time, not per-request. Free plan has 512MB RAM; a single headless page
#   render typically uses ~100-150MB, which fits, but if you see PDF
#   downloads fail with "Target closed"/OOM errors under load, upgrade to
#   `plan: starter` for more memory headroom.
#
# UPGRADE LATER (real data safety, ~$7/mo): set `plan: starter` and uncomment
# the disk + DATA_DIR lines below, then push.
services:
  - type: web
    name: msrtc-checklist
    runtime: node
    plan: free
    buildCommand: "npm install"   # installs puppeteer + bundled Chromium
    startCommand: node server/server.js
    healthCheckPath: /health
    envVars:
      - key: ADMIN_KEY
        generateValue: true  # enables GET /backup?key=... (value shown in dashboard)
      # --- GOOGLE SHEET AS DURABLE DATABASE (set these 3 in the dashboard) ---
      # With all three set, the server restores ALL sessions from the Sheet's
      # Inspection_Sessions tab at boot and mirrors every write back to it —
      # old data visible + new data survives free-plan restarts.
      # See README "Google Sheet as the live database" for the setup steps.
      - key: SHEET_ID
        sync: false          # value entered in dashboard: the spreadsheet id
      - key: GOOGLE_SA_EMAIL
        sync: false          # service-account client_email
      - key: GOOGLE_SA_PRIVATE_KEY
        sync: false          # service-account private_key (paste as-is)
      # - key: DATA_DIR      # ← uncomment when upgrading to starter + disk
      #   value: /data
    # disk:                  # ← uncomment when upgrading to starter
    #   name: msrtc-data
    #   mountPath: /data
    #   sizeGB: 1
